<!DOCTYPE html>
<html lang="en">
<head>
  <title>Arkansas Music Database</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="assets/style/amdbsite.css"> 
  
</head>
<body>

<div class="screen">
	<a href="index.html" style="color: white; text-decoration: none;">
	<div class="row header">
		<h3 id="welcome">Welcome to the</h3>
		<h1 id="amdb">Arkansas Music Database</h1>
		<hr>
	</div>
	</a>

  
<div class="row frontpage" style="position: relative;">
  <h2 style="margin-bottom: 0;">Search for an Artist</h2>
	<form action="artist.html" method="get">
      <div class="input-container" style="position: relative;">
      <input class="input-field" type="text" placeholder="Artist Name" name="search">
      <input class="input-button" type="image" src="assets/images/searchicon.png" alt="Submit">
      </div>
	</form>
  </div>
  
  <div class="row frontpage" style="background: none;"><br>
	<button class="index" onclick="alert('You pressed the button!')">Browse for an Artist</button>
  </div>
  
  <div class="row frontpage"style="background: none;"
    <h2>Not sure who to listen to? Check out a</h2>
	<button class="index" onclick="alert('You pressed the button!')">Random Artist</button>
  </div>
  
  <div class="row frontpage" style="background: none;">
    <h2>Are we missing someone?  Tell us about them!</h2>
	<button class="index" onclick="alert('You pressed the button!')">Submit New Artist</button><br><br>
	<p>Artist Data is provided by TheAudioDB.com</p>
	<a href="https://www.theaudiodb.com/">Contribute to TheAudioDB</a> 
  </div>
	 
  <div class="row about" style="background: none;">
    <button class="index" style="margin: 2%" onclick="alert('You pressed the button!')">About AMDB</button>
  </div>
  
  <div class="row footer">
		Photo Coutesy of Little Rock Convention and Visitors Bureau
	</div>
  
  
</div>

</body>
</html>
